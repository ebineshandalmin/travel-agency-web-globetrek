<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Packages | GlobeTrek Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="/style/admin.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@700;800&display=swap"
        rel="stylesheet">
    <style>
        .serif-heading {
            font-family: 'Playfair Display', serif;
        }

        /* Modal animation */
        @keyframes modalIn {
            from {
                opacity: 0;
                transform: scale(0.95);
            }

            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        .modal-content {
            animation: modalIn 0.2s ease-out;
        }
    </style>
</head>

<body class="font-[Inter] bg-gray-50 min-h-screen flex">

    <!-- Sidebar -->
    <aside class="w-72 bg-white border-r border-gray-200 flex flex-col fixed h-full z-30">
        <div class="p-6 border-b border-gray-100 sidebar-header">
            <div class="flex items-center gap-3">
                <i class="fas fa-compass text-2xl"></i>
                <div>
                    <h1 class="text-xl font-bold tracking-tight">GlobeTrek</h1>
                    <p class="text-xs font-semibold uppercase tracking-wider opacity-80">Admin Console</p>
                </div>
            </div>
        </div>
        <nav class="flex-1 px-4 py-6 space-y-1">
            <a href="/html/admin.html" class="nav-link"><i class="fas fa-th-large w-5"></i> Dashboard</a>
            <a href="/html/admin-packages.html" class="nav-link active"><i class="fas fa-box w-5"></i> Manage
                Packages</a>
            <a href="/html/admin-booking.html" class="nav-link"><i class="fas fa-calendar-check w-5"></i> Manage
                Bookings</a>
            <a href="/html/admin-user.html" class="nav-link"><i class="fas fa-users w-5"></i> Manage Users</a>
            <a href="/html/admin-queries.html" class="nav-link"><i class="fas fa-comment-dots w-5"></i> Customer
                Queries</a>
            <a href="/html/admin-reports.html" class="nav-link"><i class="fas fa-chart-line w-5"></i> Reports</a>
        </nav>
        <div class="p-4 border-t border-gray-100 space-y-3">
            <a href="/html/admin-settings.html" class="nav-link text-gray-600"><i class="fas fa-cog w-5"></i>
                Settings</a>
            <button id="logoutBtn" class="nav-link text-red-500 w-full text-left"><i
                    class="fas fa-sign-out-alt w-5"></i> Logout</button>
        </div>
    </aside>

    <!-- Main Content -->
    <main class="flex-1 ml-72 p-8">
        <header class="flex justify-between items-center mb-8">
            <h2 class="text-3xl font-bold text-gray-800 serif-heading">Manage Packages</h2>
            <div class="flex items-center gap-6">
                <div class="flex items-center gap-3 border-l pl-6">
                    <div class="text-right">
                        <p class="text-sm font-bold text-gray-800" id="adminName">Admin</p>
                        <p class="text-xs text-gray-400 uppercase font-semibold">Head Administrator</p>
                    </div>
                    <i class="fas fa-user-shield text-3xl text-teal-600"></i>
                </div>
            </div>
        </header>

        <!-- Packages Table -->
        <div class="bg-white rounded-2xl p-6 shadow-sm border border-gray-100">
            <div class="flex justify-between items-center mb-6">
                <div>
                    <h3 class="text-xl font-bold text-gray-800">All Travel Packages</h3>
                    <p class="text-sm text-gray-500">Click "Add New" to create a package</p>
                </div>
                <button id="addNewBtn" class="btn-gradient text-white px-4 py-2 rounded-xl text-sm font-semibold">
                    <i class="fas fa-plus mr-2"></i>Add New
                </button>
            </div>
            <div class="overflow-x-auto">
                <table class="w-full text-left">
                    <thead class="text-xs font-semibold uppercase">
                        <tr>
                            <th class="pb-4">Package Name</th>
                            <th class="pb-4">Destination</th>
                            <th class="pb-4">Price</th>
                            <th class="pb-4">Duration</th>
                            <th class="pb-4 text-center">Actions</th>
                        </tr>
                    </thead>
                    <tbody id="packageTableBody" class="text-sm text-gray-700"></tbody>
                </table>
            </div>
        </div>
    </main>

    <!-- ========== ADD / EDIT PACKAGE MODAL ========== -->
    <div id="packageModal" class="fixed inset-0 z-50 hidden bg-black/50 flex items-center justify-center p-4">
        <div class="bg-white rounded-2xl shadow-2xl w-full max-w-lg p-8 max-h-[90vh] overflow-y-auto modal-content">
            <div class="flex justify-between items-center mb-6">
                <h3 id="modalTitle" class="text-xl font-bold text-gray-800">Add New Package</h3>
                <button id="closeModalBtn" class="text-gray-400 hover:text-gray-600"><i
                        class="fas fa-times text-xl"></i></button>
            </div>
            <form id="packageForm" class="space-y-5">
                <input type="hidden" id="packageId">
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-2">Title</label>
                    <input type="text" id="title" required
                        class="w-full px-4 py-3 border border-gray-200 rounded-xl focus:ring-2 focus:ring-teal-500">
                </div>
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-2">Destination</label>
                    <input type="text" id="destination" required
                        class="w-full px-4 py-3 border border-gray-200 rounded-xl focus:ring-2 focus:ring-teal-500">
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-semibold text-gray-700 mb-2">Price ($)</label>
                        <input type="number" id="price" required min="0"
                            class="w-full px-4 py-3 border border-gray-200 rounded-xl focus:ring-2 focus:ring-teal-500">
                    </div>
                    <div>
                        <label class="block text-sm font-semibold text-gray-700 mb-2">Duration</label>
                        <input type="text" id="duration" required
                            class="w-full px-4 py-3 border border-gray-200 rounded-xl focus:ring-2 focus:ring-teal-500">
                    </div>
                </div>
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-2">Image URL</label>
                    <input type="url" id="image" required
                        class="w-full px-4 py-3 border border-gray-200 rounded-xl focus:ring-2 focus:ring-teal-500">
                </div>
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-2">Description</label>
                    <textarea id="description" rows="3"
                        class="w-full px-4 py-3 border border-gray-200 rounded-xl focus:ring-2 focus:ring-teal-500"></textarea>
                </div>
                <div class="flex justify-end gap-3 mt-6">
                    <button type="button" id="cancelModalBtn"
                        class="px-5 py-3 border border-gray-200 rounded-xl text-sm font-semibold hover:bg-gray-50">Cancel</button>
                    <button type="submit"
                        class="btn-gradient text-white px-6 py-3 rounded-xl font-semibold text-sm">Save Package</button>
                </div>
            </form>
        </div>
    </div>

    <script type="module" src="/script/admin-packages.js"></script>
</body>

</html>
