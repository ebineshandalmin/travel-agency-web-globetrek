<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Queries | GlobeTrek</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="/style/customer.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="font-[Inter] bg-gray-50 flex min-h-screen">

    <aside class="w-72 bg-white border-r border-gray-200 flex flex-col fixed h-full z-30">
        <div class="p-6 border-b border-gray-100 sidebar-header">
            <div class="flex items-center gap-3">
                <i class="fas fa-compass text-2xl"></i>
                <div>
                    <h1 class="text-xl font-bold tracking-tight">GlobeTrek</h1>
                    <p class="text-xs font-semibold uppercase tracking-wider opacity-80">Customer Console</p>
                </div>
            </div>
        </div>
        <nav class="flex-1 px-4 py-6 space-y-1">
            <a href="/html/customer.html" class="nav-link"><i class="fas fa-th-large w-5"></i> Dashboard</a>
            <a href="/html/customer-bookings.html" class="nav-link"><i class="fas fa-calendar-check w-5"></i> My Bookings</a>
            <a href="/html/customer-packages.html" class="nav-link"><i class="fas fa-map-marked-alt w-5"></i> Explore Packages</a>
            <a href="/html/customer-profile.html" class="nav-link"><i class="fas fa-user-circle w-5"></i> My Profile</a>
            <a href="/html/customer-queries.html" class="nav-link active"><i class="fas fa-comment-dots w-5"></i> Queries</a>
        </nav>
        <div class="p-4 border-t border-gray-100 space-y-3">
            <button id="logoutBtn" class="nav-link text-red-500 w-full text-left"><i class="fas fa-sign-out-alt w-5"></i> Logout</button>
        </div>
    </aside>

    <main class="flex-1 ml-72 p-8">
        <h2 class="text-3xl font-bold text-gray-800 mb-6">Support Queries</h2>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            <div class="lg:col-span-2">
                <div id="queriesList" class="space-y-4">
                    <p class="text-gray-500">Loading queries...</p>
                </div>
            </div>
            <div>
                <div class="bg-white rounded-2xl p-6 shadow-sm border border-gray-100">
                    <h3 class="text-lg font-bold text-gray-800 mb-4">New Query</h3>
                    <form id="queryForm" class="space-y-4">
                        <div>
                            <label class="block text-xs font-medium text-gray-700 mb-1">Subject</label>
                            <input type="text" id="querySubject" class="w-full px-4 py-3 border border-gray-200 rounded-xl focus:ring-2 focus:ring-teal-500" placeholder="e.g., Booking question">
                        </div>
                        <div>
                            <label class="block text-xs font-medium text-gray-700 mb-1">Message</label>
                            <textarea id="queryMessage" rows="4" required
                                class="w-full px-4 py-3 border border-gray-200 rounded-xl focus:ring-2 focus:ring-teal-500"
                                placeholder="Describe your issue..."></textarea>
                        </div>
                        <button type="submit"
                            class="w-full bg-teal-700 hover:bg-teal-800 text-white font-semibold py-2.5 rounded-xl shadow-sm transition">
                            <i class="fas fa-paper-plane mr-2"></i> Submit
                        </button>
                    </form>
                    <div id="submitMsg" class="mt-3 text-sm"></div>
                </div>
            </div>
        </div>
    </main>

    <script type="module" src="/script/customer-queries.js"></script>
</body>
</html>
