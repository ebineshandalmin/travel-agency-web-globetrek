<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Console | GlobeTrek</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="/style/admin.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@700;800&display=swap" rel="stylesheet">
    <style>
        .serif-heading { font-family: 'Playfair Display', serif; }
    </style>
</head>

<body class="font-[Inter] bg-gray-50 min-h-screen flex">

    <!-- ========== SIDEBAR ========== -->
    <aside class="w-72 bg-white border-r border-gray-200 flex flex-col fixed h-full z-30">
        <div class="p-6 border-b border-gray-100 sidebar-header">
            <div class="flex items-center gap-3">
                <i class="fas fa-compass text-2xl"></i>
                <div>
                    <h1 class="text-xl font-bold tracking-tight">GlobeTrek</h1>
                    <p class="text-xs font-semibold uppercase tracking-wider opacity-80">Admin Console</p>
                </div>
            </div>
        </div>
        <nav class="flex-1 px-4 py-6 space-y-1">
            <a href="/html/admin.html" class="nav-link active"><i class="fas fa-th-large w-5"></i> Dashboard</a>
            <a href="/html/admin-packages.html" class="nav-link"><i class="fas fa-box w-5"></i> Manage Packages</a>
            <a href="/html/admin-booking.html" class="nav-link"><i class="fas fa-calendar-check w-5"></i> Manage Bookings</a>
            <a href="/html/admin-user.html" class="nav-link"><i class="fas fa-users w-5"></i> Manage Users</a>
            <a href="/html/admin-queries.html" class="nav-link"><i class="fas fa-comment-dots w-5"></i> Customer Queries</a>
            <a href="/html/admin-reports.html" class="nav-link"><i class="fas fa-chart-line w-5"></i> Reports</a>
        </nav>
        <div class="p-4 border-t border-gray-100 space-y-3">
            <a href="/html/admin-settings.html" class="nav-link text-gray-600"><i class="fas fa-cog w-5"></i> Settings</a>
            <button id="logoutBtn" class="nav-link text-red-500 w-full text-left"><i class="fas fa-sign-out-alt w-5"></i> Logout</button>
        </div>
    </aside>

    <!-- ========== MAIN CONTENT ========== -->
    <main class="flex-1 ml-72 p-8">
        <!-- Header (icon instead of image, no search/bell) -->
        <header class="flex justify-between items-center mb-8">
            <h2 class="text-3xl font-bold text-gray-800 serif-heading">Admin Dashboard</h2>
            <div class="flex items-center gap-6">
                <div class="flex items-center gap-3 border-l pl-6">
                    <div class="text-right">
                        <p class="text-sm font-bold text-gray-800" id="adminName">Admin</p>
                        <p class="text-xs text-gray-400 uppercase font-semibold">Head Administrator</p>
                    </div>
                    <i class="fas fa-user-shield text-3xl text-teal-600"></i>
                </div>
            </div>
        </header>

        <!-- Stats Cards -->
        <div class="grid grid-cols-1 md:grid-cols-4 gap-6 mb-8">
            <div class="stat-card stat-pink">
                <div class="flex justify-between items-start mb-4">
                    <div class="p-3 rounded-xl stat-icon-pink"><i class="fas fa-users text-xl"></i></div>
                </div>
                <h3 class="text-3xl font-bold text-gray-800" id="statUsers">0</h3>
                <p class="text-xs font-semibold text-gray-400 uppercase tracking-wider mt-1">Total Users</p>
            </div>
            <div class="stat-card stat-blue">
                <div class="flex justify-between items-start mb-4">
                    <div class="p-3 rounded-xl stat-icon-blue"><i class="fas fa-ticket-alt text-xl"></i></div>
                </div>
                <h3 class="text-3xl font-bold text-gray-800" id="statBookings">0</h3>
                <p class="text-xs font-semibold text-gray-400 uppercase tracking-wider mt-1">Total Bookings</p>
            </div>
            <div class="stat-card stat-amber">
                <div class="flex justify-between items-start mb-4">
                    <div class="p-3 rounded-xl stat-icon-amber"><i class="fas fa-map-marked-alt text-xl"></i></div>
                </div>
                <h3 class="text-3xl font-bold text-gray-800" id="statPackages">0</h3>
                <p class="text-xs font-semibold text-gray-400 uppercase tracking-wider mt-1">Total Packages</p>
            </div>
            <div class="stat-card stat-indigo">
                <div class="flex justify-between items-start mb-4">
                    <div class="p-3 rounded-xl stat-icon-indigo"><i class="fas fa-wallet text-xl"></i></div>
                </div>
                <h3 class="text-3xl font-bold text-gray-800" id="statRevenue">$0</h3>
                <p class="text-xs font-semibold text-gray-400 uppercase tracking-wider mt-1">Total Revenue</p>
            </div>
        </div>

        <!-- Main Grid: Latest Bookings + Recent Queries + User Management (view only) -->
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            <!-- Latest Bookings -->
            <div class="lg:col-span-2 bg-white rounded-2xl p-6 shadow-sm border border-gray-100">
                <h3 class="text-xl font-bold text-gray-800 mb-4">Latest Bookings</h3>
                <div id="bookingsList" class="space-y-4"></div>
            </div>
            <!-- Recent Queries -->
            <div class="bg-white rounded-2xl p-6 shadow-sm border border-gray-100">
                <h3 class="text-xl font-bold text-gray-800 mb-4">Recent Queries</h3>
                <div id="queriesContainer" class="space-y-4"></div>
            </div>
            <!-- User Management -->
            <div class="lg:col-span-3 bg-white rounded-2xl p-6 shadow-sm border border-gray-100">
                <h3 class="text-xl font-bold text-gray-800 mb-4">User Management</h3>
                <div id="usersList" class="space-y-5"></div>
            </div>
        </div>
    </main>

    <script type="module" src="/script/admin.js"></script>
</body>
</html>
