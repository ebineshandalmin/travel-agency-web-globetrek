<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Destination Guide | GlobeTrek</title>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- External CSS (home.css for shared styles, e.g., navbar scroll) -->
    <link rel="stylesheet" href="/style/home.css">

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <!-- Google Fonts: Inter + Playfair Display -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@700;800&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Inter', sans-serif;
        }
        .serif-heading {
            font-family: 'Playfair Display', serif;
        }
        .hero-gradient {
            background: linear-gradient(to bottom, rgba(0,0,0,0.4), rgba(0,0,0,0.7));
        }
        .info-card {
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }
        .info-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 20px 30px -10px rgba(0,0,0,0.1);
        }
        .card-rose      { background: #FFF5F5; }
        .card-sky       { background: #F0F9FF; }
        .card-amber     { background: #FFFBEB; }
        .card-emerald   { background: #ECFDF5; }
        .card-purple    { background: #F5F3FF; }
        .card-teal      { background: #F0FDFA; }
        .card-lime      { background: #F7FEE7; }
        .card-indigo    { background: #EEF2FF; }
    </style>
</head>
<body class="font-[Inter] bg-gray-50">

    <!-- Hero -->
    <section id="locationHero" class="relative h-[500px] flex items-center justify-center text-white">
        <div class="absolute inset-0 z-0">
            <img id="heroImage" src="https://via.placeholder.com/1600x600" class="w-full h-full object-cover" alt="Destination">
        </div>
        <div class="absolute inset-0 z-10 hero-gradient"></div>
        <div class="relative z-20 text-center px-4">
            <h1 id="heroTitle" class="serif-heading text-5xl md:text-7xl font-extrabold drop-shadow-lg">Destination</h1>
            <p id="heroSelling" class="mt-4 text-xl md:text-2xl text-white/90 max-w-2xl mx-auto">Loading...</p>
        </div>
    </section>

    <!-- Content -->
    <main class="max-w-6xl mx-auto px-6 py-16 space-y-12">
        <div class="info-card bg-white rounded-3xl p-8 shadow-xl border border-gray-100">
            <h2 class="serif-heading text-3xl font-bold text-gray-800 mb-4">
                <i class="fas fa-info-circle text-teal-600 mr-2"></i> About This Destination
            </h2>
            <p id="shortIntro" class="text-gray-600 text-lg leading-relaxed"></p>
        </div>
        <div class="grid md:grid-cols-2 gap-8">
            <div class="info-card card-sky rounded-3xl p-8 shadow-xl border border-sky-100">
                <h3 class="serif-heading text-2xl font-bold text-gray-800 mb-4"><i class="fas fa-star text-blue-600 mr-2"></i> Main Attractions</h3>
                <ul id="attractionsList" class="list-disc list-inside text-gray-700 space-y-2"></ul>
            </div>
            <div class="info-card card-emerald rounded-3xl p-8 shadow-xl border border-emerald-100">
                <h3 class="serif-heading text-2xl font-bold text-gray-800 mb-4"><i class="fas fa-hiking text-green-600 mr-2"></i> Activities</h3>
                <ul id="activitiesList" class="list-disc list-inside text-gray-700 space-y-2"></ul>
            </div>
        </div>
        <div class="grid md:grid-cols-2 gap-8">
            <div class="info-card card-amber rounded-3xl p-8 shadow-xl border border-amber-100">
                <h3 class="serif-heading text-2xl font-bold text-gray-800 mb-4"><i class="fas fa-calendar-alt text-amber-600 mr-2"></i> Best Time to Visit</h3>
                <p id="bestTime" class="text-gray-700"></p>
            </div>
            <div class="info-card card-purple rounded-3xl p-8 shadow-xl border border-purple-100">
                <h3 class="serif-heading text-2xl font-bold text-gray-800 mb-4"><i class="fas fa-theater-masks text-purple-600 mr-2"></i> Culture & Experience</h3>
                <p id="cultureExperience" class="text-gray-700"></p>
            </div>
        </div>
        <div class="grid md:grid-cols-2 gap-8">
            <div class="info-card card-teal rounded-3xl p-8 shadow-xl border border-teal-100">
                <h3 class="serif-heading text-2xl font-bold text-gray-800 mb-4"><i class="fas fa-plane-arrival text-teal-600 mr-2"></i> Accessibility</h3>
                <p id="accessibility" class="text-gray-700"></p>
            </div>
            <div class="info-card card-rose rounded-3xl p-8 shadow-xl border border-rose-100">
                <h3 class="serif-heading text-2xl font-bold text-gray-800 mb-4"><i class="fas fa-hotel text-rose-600 mr-2"></i> Accommodation</h3>
                <p id="accommodation" class="text-gray-700"></p>
            </div>
        </div>
        <div class="grid md:grid-cols-2 gap-8">
            <div class="info-card card-lime rounded-3xl p-8 shadow-xl border border-lime-100">
                <h3 class="serif-heading text-2xl font-bold text-gray-800 mb-4"><i class="fas fa-coins text-lime-600 mr-2"></i> Cost / Budget</h3>
                <p id="costBudget" class="text-gray-700"></p>
            </div>
            <div class="info-card card-indigo rounded-3xl p-8 shadow-xl border border-indigo-100">
                <h3 class="serif-heading text-2xl font-bold text-gray-800 mb-4"><i class="fas fa-lightbulb text-indigo-600 mr-2"></i> Travel Tips</h3>
                <p id="travelTips" class="text-gray-700"></p>
            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer class="bg-gray-900 text-white pt-10 pb-8 px-6">
        <div class="text-center text-xs text-gray-500">© 2024 GlobeTrek Adventures</div>
    </footer>

    <script type="module" src="/script/location.js"></script>
</body>
</html>
