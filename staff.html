<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Staff Dashboard | GlobeTrek</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="/style/staff.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@700;800&display=swap" rel="stylesheet">
    <style>.serif-heading { font-family: 'Playfair Display', serif; }</style>
</head>
<body class="font-[Inter] bg-gray-50 min-h-screen flex">

    <!-- Sidebar (reuse admin pattern, green theme) -->
    <aside class="w-72 bg-white border-r border-gray-200 flex flex-col fixed h-full z-30">
        <div class="p-6 border-b border-gray-100 sidebar-header">
            <div class="flex items-center gap-3">
                <i class="fas fa-compass text-2xl"></i>
                <div>
                    <h1 class="text-xl font-bold tracking-tight">GlobeTrek</h1>
                    <p class="text-xs font-semibold uppercase tracking-wider opacity-80">Staff Portal</p>
                </div>
            </div>
        </div>
        <nav class="flex-1 px-4 py-6 space-y-1">
            <a href="/html/staff.html" class="nav-link active"><i class="fas fa-th-large w-5"></i> Dashboard</a>
            <a href="/html/staff-packages.html" class="nav-link"><i class="fas fa-box w-5"></i> Manage Packages</a>
            <a href="/html/staff-locations.html" class="nav-link"><i class="fas fa-map-pin w-5"></i> Manage Locations</a>
            <a href="/html/staff-booking.html" class="nav-link"><i class="fas fa-calendar-check w-5"></i> Manage Bookings</a>
            <a href="/html/staff-queries.html" class="nav-link"><i class="fas fa-comment-dots w-5"></i> Customer Queries</a>
            <a href="/html/staff-profile.html" class="nav-link"><i class="fas fa-user-circle w-5"></i> Profile</a>
        </nav>
        <div class="p-4 border-t border-gray-100 space-y-3">
            <button id="logoutBtn" class="nav-link text-red-500 w-full text-left"><i class="fas fa-sign-out-alt w-5"></i> Logout</button>
        </div>
    </aside>

    <!-- Main Content -->
    <main class="flex-1 ml-72 p-8">
        <header class="flex justify-between items-center mb-8">
            <h2 class="text-3xl font-bold text-gray-800 serif-heading">Staff Dashboard</h2>
            <div class="flex items-center gap-6">
                <div class="flex items-center gap-3 border-l pl-6">
                    <div class="text-right">
                        <p class="text-sm font-bold text-gray-800" id="staffName">Staff</p>
                        <p class="text-xs text-gray-400 uppercase font-semibold">Staff Portal</p>
                    </div>
                    <i class="fas fa-user-shield text-3xl text-green-600"></i>
                </div>
            </div>
        </header>

        <!-- Stats Cards -->
        <div class="grid grid-cols-1 md:grid-cols-4 gap-6 mb-8">
            <div class="stat-card stat-green">
                <div class="flex justify-between items-start mb-4">
                    <div class="p-3 rounded-xl stat-icon-green"><i class="fas fa-calendar-check text-xl"></i></div>
                </div>
                <h3 class="text-3xl font-bold text-gray-800" id="statTotalBookings">0</h3>
                <p class="text-xs font-semibold text-gray-400 uppercase tracking-wider mt-1">Total Bookings</p>
            </div>
            <div class="stat-card stat-amber">
                <div class="flex justify-between items-start mb-4">
                    <div class="p-3 rounded-xl stat-icon-amber"><i class="fas fa-clock text-xl"></i></div>
                </div>
                <h3 class="text-3xl font-bold text-gray-800" id="statPendingBookings">0</h3>
                <p class="text-xs font-semibold text-gray-400 uppercase tracking-wider mt-1">Pending Bookings</p>
            </div>
            <div class="stat-card stat-blue">
                <div class="flex justify-between items-start mb-4">
                    <div class="p-3 rounded-xl stat-icon-blue"><i class="fas fa-box-open text-xl"></i></div>
                </div>
                <h3 class="text-3xl font-bold text-gray-800" id="statActivePackages">0</h3>
                <p class="text-xs font-semibold text-gray-400 uppercase tracking-wider mt-1">Active Packages</p>
            </div>
            <div class="stat-card stat-purple">
                <div class="flex justify-between items-start mb-4">
                    <div class="p-3 rounded-xl stat-icon-purple"><i class="fas fa-comment-dots text-xl"></i></div>
                </div>
                <h3 class="text-3xl font-bold text-gray-800" id="statQueries">0</h3>
                <p class="text-xs font-semibold text-gray-400 uppercase tracking-wider mt-1">Customer Queries</p>
            </div>
        </div>

        <!-- Main Grid -->
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            <!-- Latest Bookings (2 cols) -->
            <div class="lg:col-span-2 bg-white rounded-2xl p-6 shadow-sm border border-gray-100">
                <h3 class="text-xl font-bold text-gray-800 mb-4">Latest Bookings</h3>
                <div id="bookingsList" class="space-y-4"></div>
            </div>

            <!-- Recent Queries -->
            <div class="bg-white rounded-2xl p-6 shadow-sm border border-gray-100">
                <h3 class="text-xl font-bold text-gray-800 mb-4">Recent Queries</h3>
                <div id="recentQueriesContainer" class="space-y-4"></div>
            </div>

            <!-- Travel Packages (view only) -->
            <div class="bg-white rounded-2xl p-6 shadow-sm border border-gray-100 lg:col-span-3">
                <h3 class="text-xl font-bold text-gray-800 mb-4">Travel Packages</h3>
                <div id="packageCardsContainer" class="space-y-4"></div>
            </div>
        </div>
    </main>

    <script type="module" src="/script/staff.js"></script>
</body>
</html>
