<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In | GlobeTrek Adventures</title>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <!-- Google Fonts: Inter + Playfair Display -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Playfair+Display:wght@700;800&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Inter', sans-serif;
        }
        .serif-heading {
            font-family: 'Playfair Display', serif;
        }
        @keyframes slowZoom {
            0%   { transform: scale(1); }
            100% { transform: scale(1.08); }
        }
        .bg-zoom {
            animation: slowZoom 20s ease-out forwards;
        }
        @keyframes slideUpSoft {
            from { opacity: 0; transform: translateY(30px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        .animate-slide-up {
            animation: slideUpSoft 0.7s ease-out forwards;
        }
        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-20px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-down {
            animation: fadeInDown 0.7s ease-out forwards;
        }
        input:focus {
            outline: none;
            box-shadow: 0 0 0 4px rgba(15, 118, 110, 0.18);
            border-color: #0f766e !important;
        }
        .btn-teal:hover {
            background-color: #0f766e;
        }
    </style>
</head>

<body class="antialiased">

    <!-- ===================== FULL SCREEN WRAPPER ===================== -->
    <div class="relative min-h-screen w-full overflow-hidden flex items-center justify-center">

        <!-- Background image -->
        <img src="/assets/hero3.jpg" alt="Travel background"
             class="absolute inset-0 w-full h-full object-cover bg-zoom">

        <!-- Dark overlay -->
        <div class="absolute inset-0 bg-gradient-to-br from-black/60 via-black/30 to-black/50"></div>

        <!-- Top left branding -->
        <div class="absolute top-10 left-10 z-20 animate-fade-down">
            <div class="flex items-center gap-3 mb-6">
                <div class="w-12 h-12 bg-teal-600/80 backdrop-blur-md rounded-2xl flex items-center justify-center shadow-lg">
                    <i class="fas fa-compass text-white text-2xl"></i>
                </div>
                <span class="text-white font-bold text-2xl tracking-tight">GlobeTrek</span>
            </div>
            <h1 class="serif-heading text-white font-extrabold text-6xl leading-tight drop-shadow-lg">
                Welcome<br>Back!
            </h1>
            <p class="text-white/75 text-lg mt-4 max-w-sm">
                Sign in to continue your curated<br>adventures around the world.
            </p>
        </div>

        <!-- Center login card -->
        <div class="relative z-20 w-full max-w-lg px-4 animate-slide-up">
            <div class="bg-white backdrop-blur-2xl rounded-3xl shadow-2xl p-10 border border-white/80">
                <div class="mb-6">
                    <h2 class="serif-heading text-4xl font-extrabold text-gray-800 mb-1">Sign In</h2>
                    <p class="text-gray-500 text-sm">Access your explorer account</p>
                </div>

                <!-- Login form (unchanged) -->
                <form id="loginForm" class="space-y-5">
                    <div>
                        <label class="block text-sm font-semibold text-gray-700 mb-2">Email address</label>
                        <div class="relative">
                            <i class="fas fa-envelope absolute left-4 top-1/2 -translate-y-1/2 text-teal-500"></i>
                            <input type="email" id="email" required
                                   placeholder="explorer@globetrek.com"
                                   class="w-full pl-11 pr-4 py-3 bg-gray-50 border border-gray-200 rounded-xl text-gray-800 text-sm transition-all focus:bg-white">
                        </div>
                    </div>

                    <div>
                        <div class="flex justify-between mb-2">
                            <label class="block text-sm font-semibold text-gray-700">Password</label>
                            <!-- Forgot password link (opens modal) -->
                            <a href="#" id="forgotPasswordLink" class="text-sm text-teal-600 hover:text-teal-800 font-medium transition">Forgot password?</a>
                        </div>
                        <div class="relative">
                            <i class="fas fa-lock absolute left-4 top-1/2 -translate-y-1/2 text-teal-500"></i>
                            <input type="password" id="password" required
                                   placeholder="••••••••"
                                   class="w-full pl-11 pr-12 py-3 bg-gray-50 border border-gray-200 rounded-xl text-gray-800 text-sm transition-all focus:bg-white">
                            <button type="button" id="togglePassword"
                                    class="absolute right-4 top-1/2 -translate-y-1/2 text-gray-400 hover:text-teal-600 transition">
                                <i class="far fa-eye"></i>
                            </button>
                        </div>
                    </div>

                    <div class="flex items-center">
                        <input type="checkbox" id="remember"
                               class="w-4 h-4 rounded border-gray-300 text-teal-600 focus:ring-teal-500">
                        <label for="remember" class="ml-2 text-sm text-gray-600">Remember this expedition</label>
                    </div>

                    <button type="submit" id="submitBtn"
                            class="btn-teal w-full bg-teal-700 text-white font-bold py-3 px-4 rounded-xl transition-all transform hover:scale-[1.02] shadow-lg flex items-center justify-center gap-2">
                        <span>LOGIN</span>
                        <i class="fas fa-arrow-right"></i>
                    </button>

                    <div id="errorMessage" class="hidden text-red-500 text-sm text-center font-medium"></div>
                </form>

                <p class="mt-6 text-center text-gray-500 text-sm">
                    Don't have an account?
                    <a href="/html/register.html" class="text-teal-700 font-semibold hover:underline">Create one now</a>
                </p>
            </div>
        </div>
    </div>

    <!-- ===================== FORGOT PASSWORD MODAL ===================== -->
    <div id="forgotModal" class="fixed inset-0 z-50 hidden bg-black/50 flex items-center justify-center p-4">
        <div class="bg-white rounded-2xl shadow-2xl w-full max-w-md p-8 animate-slide-up">
            <div class="flex justify-between items-center mb-4">
                <h3 class="text-xl font-bold text-gray-800">Reset Password</h3>
                <button id="closeForgotModal" class="text-gray-400 hover:text-gray-600">
                    <i class="fas fa-times text-xl"></i>
                </button>
            </div>
            <p class="text-sm text-gray-500 mb-4">Enter your email address and we'll send you a link to reset your password.</p>
            <form id="forgotForm" class="space-y-4">
                <div>
                    <input type="email" id="forgotEmail" required
                           placeholder="explorer@globetrek.com"
                           class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl text-gray-800 text-sm transition-all focus:bg-white">
                </div>
                <button type="submit"
                        class="w-full bg-teal-700 hover:bg-teal-600 text-white font-bold py-3 px-4 rounded-xl transition-all">
                    <i class="fas fa-paper-plane mr-2"></i> Send Reset Link
                </button>
            </form>
            <div id="forgotMsg" class="mt-4 text-sm text-center font-medium hidden"></div>
        </div>
    </div>

    <script type="module" src="/script/login.js"></script>
</body>
</html>
